<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <div class="brand">CORE<span>.</span></div>
            <nav>
                <div class="nav-item active">Dashboard</div>
                <div class="nav-item">Mercado</div>
                <div class="nav-item">Carteira</div>
                <div class="nav-item">Configurações</div>
            </nav>
            <div class="profile-card">
                <div class="avatar"></div>
                <span>Alex Silva</span>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <input type="text" placeholder="Pesquisar ativos...">
                <button class="btn-primary">Conectar Wallet</button>
            </header>

            <section class="grid-layout">
                <div class="card hero-card">
                    <h2>Nova Coleção: <br>Cyber-Neo</h2>
                    <p>Explore o futuro da arte digital hoje.</p>
                    <button class="glass-btn">Ver Agora</button>
                </div>

                <div class="card stats-card">
                    <h3>Atividade</h3>
                    <div class="chart-placeholder"></div>
                </div>

                <div class="card inventory-card">
                    <h3>Tendências</h3>
                    <div class="item-list">
                        <div class="item"><span>#1 EtherArt</span> <strong>+12%</strong></div>
                        <div class="item"><span>#2 GlitchBoy</span> <strong>+8%</strong></div>
                        <div class="item"><span>#3 NeonCity</span> <strong>-2%</strong></div>
                    </div>
                </div>

                <div class="card glass-card">
                    <h3>Saldo Total</h3>
                    <div class="balance">14.50 ETH</div>
                    <small>≈ R$ 142.400,00</small>
                </div>
            </section>
        </main>
    </div>

</body>
</html>
